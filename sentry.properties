# Sentry CLI properties — used by the Expo plugin during builds
# to upload source maps and dSYMs.
# Keep this file out of source control if it contains your auth token.
defaults.url=https://sentry.io/
defaults.org=will-captel
defaults.project=react-native
# auth.token=YOUR_SENTRY_AUTH_TOKEN   ← set via env var SENTRY_AUTH_TOKEN instead
